<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="robots" content="noindex" />
  <title>OG</title>
  <link rel="stylesheet" href="/styles/tokens.css" />
  <style>
    html, body { margin: 0; }
    .og {
      width: 1200px; height: 630px; box-sizing: border-box;
      background: var(--bg); color: var(--text);
      padding: 80px 92px; display: flex; flex-direction: column; justify-content: space-between;
      position: relative; overflow: hidden;
    }
    .og::after { content: ""; position: absolute; right: -160px; top: -160px; width: 520px; height: 520px; border-radius: 50%; background: radial-gradient(closest-side, var(--accent-tint), transparent); }
    .og__top { font-family: var(--font-sans); font-weight: 700; font-size: 22px; letter-spacing: 0.16em; text-transform: uppercase; display: flex; align-items: center; gap: 14px; }
    .og__top .mk { width: 16px; height: 16px; background: var(--accent); transform: rotate(45deg); border-radius: 3px; }
    .og__kicker { font-family: var(--font-mono); font-size: 22px; letter-spacing: 0.22em; text-transform: uppercase; color: var(--accent); margin: 0 0 14px; }
    .og__name { font-family: var(--font-display); font-weight: 340; font-size: 188px; line-height: 0.86; letter-spacing: -0.03em; margin: 0; }
    .og__sub { font-family: var(--font-display); font-size: 34px; color: var(--text-dim); margin: 22px 0 0; }
    .og__foot { font-family: var(--font-mono); font-size: 22px; color: var(--text-mute); display: flex; justify-content: space-between; }
  </style>
</head>
<body>
  <div class="og">
    <div class="og__top"><span class="mk"></span> Samuel Jo</div>
    <div>
      <p class="og__kicker">Software &amp; AI Engineer · New York</p>
      <h1 class="og__name">Samuel Jo</h1>
      <p class="og__sub"><em>Building living products</em> — Crowdtells · RegWatch · facecard · miztips · phos-analysis</p>
    </div>
    <div class="og__foot"><span>samjo.me</span><span>5 products, shipped.</span></div>
  </div>
</body>
</html>
